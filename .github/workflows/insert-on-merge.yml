name: Insert Spots on Merge

on:
  push:
    branches:
      - main
    paths:
      - "spots/**/*.yaml"
  workflow_dispatch:

jobs:
  insert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema psycopg2-binary

      - name: Get new spot files
        id: changed
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1...HEAD -- 'spots/*.yaml' | tr '\n' ' ' || true)
          MOD_FILES=$(git diff --name-only --diff-filter=M HEAD~1...HEAD -- 'spots/*.yaml' | tr '\n' ' ' || true)
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "mod_files=$MOD_FILES" >> $GITHUB_OUTPUT

      - name: Validate new spots
        if: steps.changed.outputs.new_files != ''
        run: python scripts/validate.py $NEW_FILES
        env:
          NEW_FILES: ${{ steps.changed.outputs.new_files }}

      - name: Insert new spots
        if: steps.changed.outputs.new_files != ''
        run: python scripts/insert.py $NEW_FILES
        env:
          NEW_FILES: ${{ steps.changed.outputs.new_files }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update modified spots
        if: steps.changed.outputs.mod_files != ''
        run: python scripts/update_locations.py $MOD_FILES
        env:
          MOD_FILES: ${{ steps.changed.outputs.mod_files }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Backfill all spots (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/insert.py && python scripts/update_locations.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
